name: dbt_contracts_demo
version: "1.0.0"
config-version: 2

profile: dbt_contracts_demo

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_contracts_demo:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

seeds:
  dbt_contracts_demo:
    +schema: raw
    raw_orders:
      +column_types:
        order_id: bigint
        customer_id: bigint
        product_id: bigint
        amount: decimal(10,2)
    raw_customers:
      +column_types:
        customer_id: bigint
    raw_products:
      +column_types:
        product_id: bigint
        price: decimal(10,2)
