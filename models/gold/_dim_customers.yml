version: 2

models:
  - name: dim_customers
    description: "Customer dimension table with enforced contract."

    config:
      contract:
        enforced: true

    columns:
      - name: customer_id
        data_type: bigint
        description: "Primary key."
        constraints:
          - type: not_null
          - type: unique
      - name: name
        data_type: varchar
        description: "Full customer name."
      - name: email
        data_type: varchar
        description: "Customer email address."
      - name: country
        data_type: varchar
        description: "ISO country code."
