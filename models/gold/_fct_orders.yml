version: 2

models:
  - name: gold_fct_orders_v1
    description: "Fact table v1 — 6 columns, baseline."
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [order_id]
    columns:
      - name: order_id
        data_type: bigint
        constraints: [{type: not_null}]
      - name: customer_id
        data_type: bigint
        constraints: [{type: not_null}]
      - name: product_id
        data_type: bigint
        constraints: [{type: not_null}]
      - name: amount
        data_type: decimal(10,2)
        constraints: [{type: not_null}]
      - name: status
        data_type: varchar
      - name: order_date
        data_type: date

  - name: gold_fct_orders_v2
    description: "Fact table v2 — adds product_category."
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [order_id]
    columns:
      - name: order_id
        data_type: bigint
        constraints: [{type: not_null}]
      - name: customer_id
        data_type: bigint
        constraints: [{type: not_null}]
      - name: product_id
        data_type: bigint
        constraints: [{type: not_null}]
      - name: amount
        data_type: decimal(10,2)
        constraints: [{type: not_null}]
      - name: status
        data_type: varchar
      - name: order_date
        data_type: date
      - name: product_category
        data_type: varchar
